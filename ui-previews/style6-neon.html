<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>风格6：霓虹赛博风</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:#0a0a1a;overflow:hidden;position:relative;
}
/* 网格线背景 */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(139,92,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.06) 1px,transparent 1px);
  background-size:40px 40px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;pointer-events:none}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,.4),transparent 70%);top:-100px;right:-50px;animation:f 15s ease-in-out infinite}
.orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(6,182,212,.3),transparent 70%);bottom:-80px;left:-50px;animation:f 20s ease-in-out infinite reverse}
.orb3{width:250px;height:250px;background:radial-gradient(circle,rgba(244,63,94,.25),transparent 70%);top:60%;right:30%;animation:f 12s ease-in-out 2s infinite}
@keyframes f{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.1)}}
.card{
  position:relative;z-index:1;width:420px;padding:44px 40px;border-radius:20px;
  background:rgba(15,15,35,.7);backdrop-filter:blur(24px);
  border:1px solid rgba(168,85,247,.2);box-shadow:0 0 40px rgba(168,85,247,.15),0 0 80px rgba(168,85,247,.05);
  animation:up .6s;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;font-size:28px;font-weight:800;margin-bottom:4px;color:#e2e8f0;
  text-shadow:0 0 20px rgba(168,85,247,.5)}
.logo span{background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:28px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.03);border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:8px;border:none;background:transparent;border-radius:10px;font-size:13px;color:#94a3b8;cursor:pointer;transition:.2s}
.tab.on{background:rgba(168,85,247,.15);color:#c084fc;font-weight:600;text-shadow:0 0 10px rgba(168,85,247,.3)}
label{display:block;font-size:13px;font-weight:600;color:#c084fc;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1px solid rgba(168,85,247,.2);border-radius:10px;background:rgba(255,255,255,.04);font-size:14px;color:#e2e8f0;outline:none;transition:.2s;margin-bottom:16px}
input:focus{border-color:#a855f7;box-shadow:0 0 16px rgba(168,85,247,.2)}
input::placeholder{color:#4a4a6a}
.btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 0 20px rgba(168,85,247,.4);transition:.2s;margin-top:4px;text-shadow:0 0 10px rgba(255,255,255,.3)}
.btn:hover{box-shadow:0 0 40px rgba(168,85,247,.6);transform:translateY(-1px)}
.link{text-align:center;margin-top:20px;font-size:13px;color:#94a3b8}
.link a{color:#06b6d4;font-weight:600;text-decoration:none;text-shadow:0 0 10px rgba(6,182,212,.3)}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="card">
  <div class="logo"><span>Lucky Spin</span></div>
  <div class="sub">霓虹赛博风 — 参考 Discord / 赛博朋克</div>
  <div class="tabs">
    <button class="tab on">📱 手机号</button>
    <button class="tab">📧 邮箱</button>
    <button class="tab">🔐 验证码</button>
  </div>
  <label>手机号</label>
  <input placeholder="请输入手机号">
  <label>密码</label>
  <input type="password" placeholder="请输入密码">
  <button class="btn">登 录</button>
  <div class="link">没有账号？<a href="#">立即注册</a></div>
</div>
</body>
</html>
