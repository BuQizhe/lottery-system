<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>风格5：Neumorphism 拟物风</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:#e0e5ec;
}
.card{
  width:420px;padding:44px 40px;border-radius:24px;
  background:#e0e5ec;
  box-shadow:8px 8px 16px #b8bec7,-8px -8px 16px #fff;
}
.logo{text-align:center;font-size:28px;font-weight:800;margin-bottom:4px;color:#5b6abf}
.sub{text-align:center;color:#a0a8c0;font-size:14px;margin-bottom:28px}
.tabs{display:flex;gap:6px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:10px 0;border:none;font-size:12px;color:#a0a8c0;cursor:pointer;border-radius:12px;background:#e0e5ec;box-shadow:3px 3px 6px #b8bec7,-3px -3px 6px #fff;transition:.2s}
.tab.on{box-shadow:inset 3px 3px 6px #b8bec7,inset -3px -3px 6px #fff;color:#5b6abf;font-weight:600}
label{display:block;font-size:13px;font-weight:600;color:#7a8299;margin-bottom:8px}
input{width:100%;padding:12px 16px;border:none;border-radius:12px;background:#e0e5ec;box-shadow:inset 3px 3px 6px #b8bec7,inset -3px -3px 6px #fff;font-size:14px;color:#5b6abf;outline:none;margin-bottom:18px}
input::placeholder{color:#a0a8c0}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:4px 4px 10px #b8bec7,-4px -4px 10px #fff;transition:.2s;margin-top:6px}
.btn:hover{transform:translateY(-1px);box-shadow:6px 6px 14px #b8bec7,-6px -6px 14px #fff}
.link{text-align:center;margin-top:20px;font-size:13px;color:#a0a8c0}
.link a{color:#667eea;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lucky Spin</div>
  <div class="sub">Neumorphism 拟物风 — 参考 Apple Music</div>
  <div class="tabs">
    <button class="tab on">📱 手机号</button>
    <button class="tab">📧 邮箱</button>
    <button class="tab">🔐 验证码</button>
  </div>
  <label>手机号</label>
  <input placeholder="请输入手机号">
  <label>密码</label>
  <input type="password" placeholder="请输入密码">
  <button class="btn">登 录</button>
  <div class="link">没有账号？<a href="#">立即注册</a></div>
</div>
</body>
</html>
