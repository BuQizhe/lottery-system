<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>风格1：紫蓝渐变亮色风</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:linear-gradient(135deg,#e0e7ff 0%,#fce7f3 35%,#dbeafe 65%,#ede9fe 100%);
  position:relative;overflow:hidden;
}
/* 浮动光斑 */
.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,.3),transparent 70%);top:-120px;right:-80px;animation:f 20s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);bottom:-80px;left:-60px;animation:f 25s ease-in-out infinite reverse}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,.2),transparent 70%);top:50%;left:50%;animation:f 18s ease-in-out 3s infinite}
@keyframes f{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.05)}50%{transform:translate(-20px,20px) scale(.95)}75%{transform:translate(15px,30px) scale(1.02)}}
/* 卡片 */
.card{
  position:relative;z-index:1;width:420px;padding:44px 40px;border-radius:20px;
  background:rgba(255,255,255,.6);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,.5);box-shadow:0 8px 32px rgba(99,102,241,.1);
  animation:up .6s;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;font-size:28px;font-weight:800;margin-bottom:4px;
  background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#6366f1;font-size:14px;margin-bottom:28px;opacity:.6}
.tabs{display:flex;gap:4px;background:rgba(99,102,241,.04);border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:8px;border:none;background:transparent;border-radius:10px;font-size:13px;color:#6366f1;cursor:pointer;transition:.2s}
.tab.on{background:rgba(99,102,241,.12);font-weight:600;color:#4f46e5}
label{display:block;font-size:13px;font-weight:600;color:#4338ca;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1px solid rgba(99,102,241,.15);border-radius:10px;background:rgba(255,255,255,.5);font-size:14px;color:#1e1b4b;outline:none;transition:.2s;margin-bottom:16px}
input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12);background:rgba(255,255,255,.7)}
input::placeholder{color:#a5b4fc}
.btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(99,102,241,.3);transition:.2s;margin-top:4px}
.btn:hover{box-shadow:0 4px 20px rgba(99,102,241,.45);transform:translateY(-1px)}
.link{text-align:center;margin-top:20px;font-size:13px;color:#6366f1;opacity:.6}
.link a{color:#4f46e5;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="card">
  <div class="logo">Lucky Spin</div>
  <div class="sub">紫蓝渐变亮色风 — 参考 Linear / Notion</div>
  <div class="tabs">
    <button class="tab on">📱 手机号</button>
    <button class="tab">📧 邮箱</button>
    <button class="tab">🔐 验证码</button>
  </div>
  <label>手机号</label>
  <input placeholder="请输入手机号">
  <label>密码</label>
  <input type="password" placeholder="请输入密码">
  <button class="btn">登 录</button>
  <div class="link">没有账号？<a href="#">立即注册</a></div>
</div>
</body>
</html>
