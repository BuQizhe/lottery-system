<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 · 抽奖系统</title>
    <link rel="stylesheet" href="/css/glass.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { min-height:100vh; }

        .ranking-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* 滚动公告条 */
        .notice-bar {
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 3px;
            padding: 14px 20px;
            margin-bottom: 32px;
            overflow: hidden;
            position: relative;
        }
        .notice-label {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 80px;
            background: #2d2d2d;
            color: #faf8f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 1;
        }
        .notice-content {
            margin-left: 90px;
            overflow: hidden;
            height: 20px;
        }
        .notice-scroll {
            animation: scrollUp 20s linear infinite;
        }
        .notice-scroll div {
            height: 20px;
            line-height: 20px;
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        .notice-scroll .hl { color: #2d2d2d; font-weight: 600; }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* 个人战绩 */
        .my-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }
        .stat-card {
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 3px;
            padding: 24px;
            text-align: center;
        }
        .stat-card .num {
            font-size: 32px;
            color: #2d2d2d;
            letter-spacing: 2px;
        }
        .stat-card .label {
            font-size: 12px;
            color: #a09888;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        /* 排行榜 */
        .ranking-list {
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 3px;
            overflow: hidden;
        }
        .ranking-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e8e4df;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ranking-header h2 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 4px;
        }
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f5f2ee;
            transition: background .2s;
        }
        .ranking-item:hover { background: #faf8f5; }
        .ranking-item:last-child { border-bottom: none; }
        .rank-num {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #a09888;
            border: 1px solid #e8e4df;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .rank-1 { background: #2d2d2d; color: #faf8f5; border-color: #2d2d2d; }
        .rank-2 { background: #666; color: #faf8f5; border-color: #666; }
        .rank-3 { background: #999; color: #faf8f5; border-color: #999; }
        .rank-name { flex: 1; font-size: 14px; color: #2d2d2d; letter-spacing: 1px; }
        .rank-count {
            font-size: 14px;
            color: #a09888;
            letter-spacing: 1px;
        }
        .rank-count span { color: #2d2d2d; font-weight: 600; }

        .empty-msg {
            padding: 40px;
            text-align: center;
            color: #c4bfb8;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="jp-style">
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<!-- 导航 -->
<nav class="jp-nav">
    <span class="jp-nav-brand">幸运大转盘</span>
    <div class="jp-nav-right">
        <a href="member.html" style="color:#a09888;text-decoration:none;font-size:13px;letter-spacing:1px;transition:.3s" onmouseover="this.style.color='#2d2d2d'" onmouseout="this.style.color='#a09888'">抽奖</a>
        <a href="ranking.html" style="color:#2d2d2d;text-decoration:none;font-size:13px;letter-spacing:1px">排行榜</a>
        <button onclick="logout()" style="border:1px solid #d4cfc8;background:#fff;color:#a09888;padding:6px 16px;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:2px;transition:.3s" onmouseover="this.style.borderColor='#2d2d2d';this.style.color='#2d2d2d'" onmouseout="this.style.borderColor='#d4cfc8';this.style.color='#a09888'">退出</button>
    </div>
</nav>

<div class="ranking-wrap">

    <!-- 滚动公告 -->
    <div class="notice-bar fade-in-up">
        <div class="notice-label">公告</div>
        <div class="notice-content">
            <div class="notice-scroll" id="noticeScroll">
                <div>加载中...</div>
            </div>
        </div>
    </div>

    <!-- 个人战绩 -->
    <div class="my-stats fade-in-up-1">
        <div class="stat-card">
            <div class="num" id="myWinCount">-</div>
            <div class="label">我的中奖次数</div>
        </div>
        <div class="stat-card">
            <div class="num" id="myLastPrize" style="font-size:18px;letter-spacing:1px;">-</div>
            <div class="label">最近中奖</div>
        </div>
    </div>

    <!-- 排行榜 -->
    <div class="ranking-list fade-in-up-2">
        <div class="ranking-header">
            <h2>中奖排行榜</h2>
            <span style="font-size:12px;color:#c4bfb8;letter-spacing:1px">TOP 10</span>
        </div>
        <div id="rankingList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

</div>

<script>
    // 页面初始化：并行加载所有数据
    async function init() {
        // 并行请求三个接口（用 Promise.all 提高加载速度）
        const [ranking, recent, stats] = await Promise.all([
            fetch('/api/ranking').then(r => r.json()).catch(() => null),
            fetch('/api/recentWins').then(r => r.json()).catch(() => null),
            fetch('/api/user/stats').then(r => r.json()).catch(() => null)
        ]);

        // 渲染滚动公告
        if (recent && recent.code === 200 && recent.data.length) {
            renderNotice(recent.data);
        }

        // 渲染个人战绩
        if (stats && stats.code === 200) {
            document.getElementById('myWinCount').textContent = stats.data.winCount;
            document.getElementById('myLastPrize').textContent = stats.data.lastPrize;
        }

        // 渲染排行榜
        if (ranking && ranking.code === 200 && ranking.data.length) {
            renderRanking(ranking.data);
        } else {
            document.getElementById('rankingList').innerHTML = '<div class="empty-msg">暂无数据</div>';
        }
    }

    /**
     * 渲染滚动公告
     * 把中奖记录做成文字列表，通过 CSS 动画自动向上滚动
     * 复制一份内容实现无缝循环滚动
     */
    function renderNotice(data) {
        const el = document.getElementById('noticeScroll');
        let html = '';
        // 生成两份相同内容（用于无缝循环）
        for (let round = 0; round < 2; round++) {
            data.forEach(item => {
                const time = item.draw_time ? item.draw_time.substring(5, 16) : '';
                html += `<div><span class="hl">${item.user_name}</span> 抽中了 <span class="hl">${item.prize_name}</span> ${time}</div>`;
            });
        }
        el.innerHTML = html;
    }

    /**
     * 渲染排行榜
     * 前三名有不同的背景色
     */
    function renderRanking(data) {
        const el = document.getElementById('rankingList');
        el.innerHTML = data.map((item, i) => {
            const rankClass = i < 3 ? `rank-${i + 1}` : '';
            return `<div class="ranking-item">
                <div class="rank-num ${rankClass}">${i + 1}</div>
                <div class="rank-name">${item.user_name}</div>
                <div class="rank-count"><span>${item.win_count}</span> 次中奖</div>
            </div>`;
        }).join('');
    }

    async function logout() {
        await fetch('/api/logout');
        location.href = 'blogin.html';
    }

    init();
</script>
</body>
</html>
