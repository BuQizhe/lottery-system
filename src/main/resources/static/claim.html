<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>奖品核销 - 抽奖系统</title>
    <link rel="stylesheet" href="/css/glass.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .claim-card { width: 420px; padding: 48px 40px; text-align: center; }
        .claim-card h2 { font-weight: 400; font-size: 22px; letter-spacing: 6px; margin-bottom: 8px; }
        .claim-card .subtitle { font-size: 12px; color: #a09888; letter-spacing: 2px; margin-bottom: 36px; }
        .claim-input { width: 100%; padding: 14px 0; border: none; border-bottom: 1px solid #d4cfc8; font-size: 24px; color: #2d2d2d; background: transparent; outline: none; text-align: center; letter-spacing: 8px; font-family: inherit; transition: border-color .3s; }
        .claim-input:focus { border-bottom-color: #2d2d2d; }
        .claim-input::placeholder { color: #c4bfb8; font-size: 14px; letter-spacing: 2px; }
        .claim-btn { width: 100%; margin-top: 32px; }
        #result { margin-top: 24px; font-size: 14px; letter-spacing: 1px; }
        .result-success { color: #5a8a5a; }
        .result-error { color: #b85a5a; }
    </style>
</head>
<body class="jp-style">
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="jp-card claim-card fade-in-up">
    <h2>奖品核销</h2>
    <div class="jp-divider"></div>
    <div class="subtitle">CLAIM PRIZE</div>

    <input type="text" id="claimCode" class="claim-input" placeholder="请输入6位核销码" maxlength="6">
    <button class="jp-btn jp-btn-primary claim-btn" onclick="doClaim()">确 认 核 销</button>
    <div id="result"></div>
</div>

<script>
    async function doClaim() {
        const claimCode = document.getElementById('claimCode').value;
        if (!claimCode || claimCode.length !== 6) { alert('请输入6位核销码'); return; }
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '核销中...';
        resultDiv.className = '';
        try {
            const response = await fetch('/api/admin/claimPrize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ claimCode: claimCode })
            });
            const result = await response.json();
            if (result.code === 200) {
                resultDiv.innerHTML = '核销成功';
                resultDiv.className = 'result-success';
                document.getElementById('claimCode').value = '';
            } else {
                resultDiv.innerHTML = result.message;
                resultDiv.className = 'result-error';
            }
        } catch (error) {
            resultDiv.innerHTML = '核销失败';
            resultDiv.className = 'result-error';
        }
    }
</script>
</body>
</html>
