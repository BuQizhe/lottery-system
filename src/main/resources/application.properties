# ==================== 服务器配置 ====================
server.port=8080
server.servlet.context-path=/

# ==================== 静态资源配置 ====================
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/**

# ==================== 数据库连接 ====================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/lottery_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# ==================== MyBatis 配置 ====================
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.example.lotterysystem.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.cache-enabled=false
mybatis.configuration.local-cache-scope=statement

# ==================== 邮件服务（QQ邮箱） ====================
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=3849578254@qq.com
spring.mail.password=ioyzxoivzkdhcbge
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.qq.com

# ==================== 验证码配置 ====================
verification.code.expire-minutes=5
verification.code.send-interval=60

# ==================== 文件上传 ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==================== 日志 ====================
logging.level.com.example.lotterysystem=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ==================== Gzip 压缩 ====================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# ==================== Redis 缓存 ====================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

